# =============================================================================
# AssetMonitor — Docker Compose
#
# Zero-friction startup:
#   docker-compose up -d
#   open http://localhost:5000
#
# Admin credentials are printed in the container log on first start.
# Set DASHBOARD_SECRET below to lock in a specific admin password.
#
# Linux host only — pre-create the data directory before first run:
#   mkdir -p data && chown 1000:1000 data
# (macOS / Windows with Docker Desktop — no extra steps needed.)
# =============================================================================

services:
  assetmonitor:
    build:
      context: .
      dockerfile: Dockerfile

    image: assetmonitor:latest

    container_name: assetmonitor

    restart: unless-stopped

    environment:
      TZ: UTC
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"

      # Set this to lock in the admin password (recommended for anything
      # beyond a personal/local installation).  If unset, a random password
      # is generated and printed to the container log on first start.
      # DASHBOARD_SECRET: "changeme"

    # Resource limits (non-swarm / plain docker compose syntax)
    mem_limit: 768m
    cpus: "2.0"
    memswap_limit: 768m

    # NET_RAW enables SYN-mode nmap scanning (-sS) from the non-root user.
    # Remove if you prefer TCP-connect-only scanning with no capabilities.
    cap_add:
      - NET_RAW

    ports:
      # Web dashboard — http://localhost:5000
      - "5000:5000"

    volumes:
      # Persistent database and settings — must be writable by UID 1000 on Linux
      - ./data:/app/data

      # Optional: mount a custom config.yaml to override baked-in defaults
      # - ./config.yaml:/app/config.yaml:ro

      # Optional: mount wordlists for DNS bruteforce
      # - ./wordlists:/app/wordlists:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
